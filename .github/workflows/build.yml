name: build

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and run core physics tests
        run: ./gradlew build :core:test
      - uses: actions/upload-artifact@v4
        with:
          name: spacereloaded
          path: mod/build/libs/*.jar

  gametest:
    runs-on: ubuntu-latest
    # E2E-стенд: реальный клиент под Xvfb. Помечен как неблокирующий,
    # пока не подтверждена стабильность GL в headless-окружении GitHub.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run client gametest rig under Xvfb
        run: xvfb-run --auto-servernum ./gradlew :mod:runClientGametest
